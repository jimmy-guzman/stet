# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
      - ".agents/skills/**"
      - ".claude/skills/**"
reviews:
  path_filters:
    - "!.agents/skills/**"
    - "!.claude/skills/**"
