name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - name: build all targets
        run: bun script/build.ts --archive
      - name: upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/*.zip dist/*.tar.gz --clobber
      # npm >= 11.5 (node 24) is required for OIDC trusted publishing
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: publish platform packages
        run: |
          for dir in dist/torre-*/; do
            (cd "$dir" && npm publish)
          done
      - name: publish launcher package
        run: cd dist/torre && npm publish

  homebrew:
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: render formula
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p assets
          for name in torre-darwin-arm64.zip torre-darwin-x64.zip torre-linux-x64.tar.gz torre-linux-arm64.tar.gz; do
            gh release download "$TAG" --pattern "$name" --dir assets
          done
          render() { shasum -a 256 "assets/$1" | cut -d' ' -f1; }
          sed -e "s/{{VERSION}}/$VERSION/g" \
              -e "s/{{SHA_DARWIN_ARM64}}/$(render torre-darwin-arm64.zip)/" \
              -e "s/{{SHA_DARWIN_X64}}/$(render torre-darwin-x64.zip)/" \
              -e "s/{{SHA_LINUX_X64}}/$(render torre-linux-x64.tar.gz)/" \
              -e "s/{{SHA_LINUX_ARM64}}/$(render torre-linux-arm64.tar.gz)/" \
              script/torre.rb.tmpl > torre.rb
      - name: push to tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/jimmy-guzman/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp torre.rb tap/Formula/torre.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/torre.rb
          git commit -m "torre ${VERSION}"
          git push
