preload = ["@opentui/solid/preload"]

[install]
# Flat node_modules. Bun defaults a newly-added workspace to the isolated
# linker, whose symlinked .bun store breaks Next.js/Turbopack's RSC client
# manifest resolution (global-error builtin) in dev. Hoisted matches what the
# TUI already used before the docs workspace existed.
linker = "hoisted"

[test]
preload = ["@opentui/solid/preload", "./test/setup.ts"]
